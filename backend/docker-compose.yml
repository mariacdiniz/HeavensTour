services:
  mongo:
    image: mongo:7
    container_name: heavenstour-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  localstack:
    image: localstack/localstack:3
    container_name: heavenstour-localstack
    ports:
      - '4566:4566'
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
    volumes:
      - localstack_data:/var/lib/localstack

  api:
    build: .
    container_name: heavenstour-api
    ports:
      - '3333:3333'
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/heavenstour
      AWS_ENDPOINT: http://localstack:4566
      AWS_PUBLIC_ENDPOINT: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_BUCKET: heavens-tour-aircraft
      AWS_FORCE_PATH_STYLE: 'true'
      UPLOAD_MODE: s3
      FRONTEND_URL: http://localhost:5173,http://127.0.0.1:5173,http://host.docker.internal:5173
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      localstack:
        condition: service_started
    command: sh -c "node scripts/wait-deps.js && node index.js"
    restart: unless-stopped

volumes:
  mongo_data:
  localstack_data:
