<!doctype html>
<html lang="pt-BR">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="HeavensTour — gestão profissional de aeronaves com ICAO, autonomia, relatórios e upload de imagens."

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <script>
      try {
        var t = localStorage.getItem('heavens_tour_theme');
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
